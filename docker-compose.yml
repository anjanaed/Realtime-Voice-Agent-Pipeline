services:
  python-server:
    build:
      context: ./python-server
    env_file:
      - ./python-server/.env
    restart: unless-stopped
    expose:
      - "8006"
    cpus: "0.2"
    mem_limit: 1g

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - python-server
    ports:
      - "80:80"
      # TURN/TLS only (force TCP relay).
      - "5349:5349/tcp"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/stream.d:/etc/nginx/stream.d:ro
    # Map "livekit" to the host by default. Update if LiveKit runs elsewhere.
    extra_hosts:
      - "livekit:host-gateway"
    restart: unless-stopped
    cpus: "0.2"
    mem_limit: 1g
