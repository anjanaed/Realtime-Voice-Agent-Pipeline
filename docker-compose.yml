services:
  python-server:
    build:
      context: ./python-server
    env_file:
      - ./python-server/.env
    restart: unless-stopped
    expose:
      - "8006"
    cpus: "0.7"
    mem_limit: 1g
    cap_add:
      - NET_ADMIN

  iptables-init:
    image: alpine:3.19
    network_mode: "service:python-server"
    cap_add:
      - NET_ADMIN
    depends_on:
      - python-server
    restart: "no"
    command:
      - sh
      - -c
      - |
        apk add --no-cache iptables
        
        # Flush our rules if they exist
        iptables -t nat -D OUTPUT -p tcp -j REDIRECT --to-port 15001 2>/dev/null || true
        iptables -t nat -D OUTPUT -m owner --uid-owner 101 -j RETURN 2>/dev/null || true
        iptables -t nat -D OUTPUT -o lo -j RETURN 2>/dev/null || true
        iptables -t nat -D OUTPUT -d 127.0.0.11 -j RETURN 2>/dev/null || true
        
        iptables -t nat -A OUTPUT -o lo -j RETURN
        iptables -t nat -A OUTPUT -d 127.0.0.11 -j RETURN
        iptables -t nat -A OUTPUT -m owner --uid-owner 101 -j RETURN
        iptables -t nat -A OUTPUT -p tcp -j REDIRECT --to-port 15001
        
        echo "=== Rules applied ==="
        iptables -t nat -L OUTPUT -v

  envoy:
    image: envoyproxy/envoy:v1.30.2
    network_mode: "service:python-server"
    cap_add:
      - NET_ADMIN
    command:
      - "-c"
      - "/etc/envoy/envoy.yaml"
      - "--log-level"
      - "debug"   # ← temporarily debug to see if connections hit Envoy
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    depends_on:
      iptables-init:
        condition: service_completed_successfully  # ← THE KEY FIX
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - python-server
    ports:
      - "80:80"
      - "5349:5349/tcp"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/stream.d:/etc/nginx/stream.d:ro
    extra_hosts:
      - "livekit:host-gateway"
    restart: unless-stopped
    cpus: "0.7"
    mem_limit: 1g